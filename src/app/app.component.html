<div class="app-container">
  <header class="header">
    <div class="header-content">
      <div class="logo-section">
        <i-lobehub name="lobehub-color" class="logo-icon"></i-lobehub>
        <h1>{{ homeTitle() }}</h1>
      </div>
      <nav class="nav-menu">
        @for (page of navPages; track page) {
          <a
            [routerLink]="['/', page]"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: page === 'home' }"
            class="nav-btn">
            {{ navLabel(page)() }}
          </a>
        }
      </nav>
      <div class="nav-actions">
        <button type="button" class="lang-btn" (click)="toggleLanguage()">
          {{ langToggleLabel() }}
        </button>
        <a href="https://github.com/xylplm/angular-lobehub-icons" target="_blank" rel="noopener noreferrer" class="btn btn-secondary">
          <i-lobehub name="github"></i-lobehub>
          GitHub
        </a>
      </div>
    </div>
  </header>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <p>{{ footer() }}</p>
    </div>
  </footer>
</div>
