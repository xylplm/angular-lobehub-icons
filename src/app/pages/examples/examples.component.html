<section class="examples-section">
  <div class="section-content">
    <h2>{{ title() }}</h2>

    <article class="example-article">
      <h3>{{ basicTitle() }}</h3>
      <div class="example-content">
        <div class="demo">
          <i-lobehub name="github"></i-lobehub>
        </div>
        <div class="code-block">
          <code>&lt;i-lobehub name="github"&gt;&lt;/i-lobehub&gt;</code>
        </div>
      </div>
    </article>

    <article class="example-article">
      <h3>{{ sizingTitle() }}</h3>
      <div class="example-content">
        <div class="demo">
          <div class="size-demo">
            <div class="size-item">
              <i-lobehub name="openai" style="width: 24px; height: 24px;"></i-lobehub>
              <span>24px</span>
            </div>
            <div class="size-item">
              <i-lobehub name="openai" style="width: 36px; height: 36px;"></i-lobehub>
              <span>36px</span>
            </div>
            <div class="size-item">
              <i-lobehub name="openai" style="width: 48px; height: 48px;"></i-lobehub>
              <span>48px</span>
            </div>
            <div class="size-item">
              <i-lobehub name="openai" style="width: 64px; height: 64px;"></i-lobehub>
              <span>64px</span>
            </div>
          </div>
        </div>
      </div>
    </article>

    <article class="example-article">
      <h3>{{ coloringTitle() }}</h3>
      <div class="example-content">
        <div class="demo">
          <div class="color-demo">
            <div class="color-item">
              <i-lobehub name="openai" style="color: #667eea; font-size: 40px;"></i-lobehub>
              <span>#667eea</span>
            </div>
            <div class="color-item">
              <i-lobehub name="openai" style="color: #764ba2; font-size: 40px;"></i-lobehub>
              <span>#764ba2</span>
            </div>
            <div class="color-item">
              <i-lobehub name="openai" style="color: #f093fb; font-size: 40px;"></i-lobehub>
              <span>#f093fb</span>
            </div>
            <div class="color-item">
              <i-lobehub name="openai" style="color: #4facfe; font-size: 40px;"></i-lobehub>
              <span>#4facfe</span>
            </div>
          </div>
        </div>
      </div>
    </article>

    <article class="example-article">
      <h3>{{ standaloneTitle() }}</h3>
      <p>{{ standaloneDesc() }}</p>
      <app-standalone></app-standalone>
    </article>
  </div>
</section>
